name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        # Requires "Dependency graph" to be enabled in Settings → Security & Analysis.
        # continue-on-error keeps PRs unblocked until that setting is turned on.
        continue-on-error: true
